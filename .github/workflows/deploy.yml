
name: Deploy documentation to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull And Verify LFS Zip Files
        run: |
          git lfs pull --include="public/resources/Echo-Mate/nand_buildroot_img_260329.zip,public/resources/Echo-Mate/sd_buildroot_img_260329.zip"
          for f in public/resources/Echo-Mate/nand_buildroot_img_260329.zip public/resources/Echo-Mate/sd_buildroot_img_260329.zip; do
            if grep -aq "version https://git-lfs.github.com/spec/v1" "$f"; then
              echo "ERROR: $f is still an LFS pointer, not a real zip file"
              exit 1
            fi
          done

      - name: Sync Selected Files to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_CMD_ARGS: '-o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o ConnectTimeout=20 -o StrictHostKeyChecking=no'
          ARGS: >-
            -avzr
            --info=progress2
            --stats
            --partial
            --timeout=120
            --prune-empty-dirs
            --include='content/***'
            --include='public/***'
            --include='index.md'
            --include='.vitepress/'
            --include='.vitepress/config/'
            --include='.vitepress/config/nav.ts'
            --include='.vitepress/config/sidebar.ts'
            --exclude='*'
          SOURCE: './'
          REMOTE_HOST: '114.132.159.108'
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          TARGET: '/www/wwwroot/no-chicken.com/'

      - name: Build on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '114.132.159.108'
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd /www/wwwroot/no-chicken.com
            npm install
            npm run docs:build
